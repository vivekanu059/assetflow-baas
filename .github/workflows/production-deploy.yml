name: AssetFlow Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Tells GitHub to run all commands inside the api-gateway folder
    defaults:
      run:
        working-directory: ./api-gateway

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Prisma Schema
        run: npx prisma validate

  trigger-render-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API Gateway Deployment
        # Fires the webhook to Render only if the build passes
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}