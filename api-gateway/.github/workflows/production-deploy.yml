name: AssetFlow Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Prisma Schema
        run: npx prisma validate

      # If the steps above fail, the pipeline stops and Render is NOT triggered.
      # If they pass, we tell Render it is safe to deploy!

  trigger-render-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API Gateway Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}